<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Studio Om - Pro Admin</title>
    <link href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" rel="stylesheet">
    <script src="https://unpkg.com/grapesjs"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; }
        #gjs { height: 100%; }
        .file-select-container { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); z-index: 999; }
        select { padding: 5px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
    </style>
</head>
<body>
    <div class="file-select-container">
        <select id="file-selector">
            <option value="">-- Select Page to Edit --</option>
        </select>
    </div>
    
    <div id="gjs"></div>

    <script>
        // --- CONFIGURATION ---
        const owner = 'StudioOM'; 
        const repo = 'testsite';
        let currentPath = 'index.html'; // Default

        const editor = grapesjs.init({
            container: '#gjs',
            height: '100%',
            storageManager: false,
            // TAILWIND FIX 1: Load Tailwind inside the editor canvas
            canvas: {
                scripts: ['https://cdn.tailwindcss.com'],
            }
        });

        // --- FILE SELECTOR LOGIC ---
        const fileSelector = document.getElementById('file-selector');

        async function loadFileList() {
            const token = localStorage.getItem('gh_pat');
            if (!token) return;

            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const files = await res.json();
            
            // Filter for HTML files
            files.filter(f => f.name.endsWith('.html')).forEach(file => {
                const opt = document.createElement('option');
                opt.value = file.path;
                opt.textContent = file.name;
                fileSelector.appendChild(opt);
            });
        }

        fileSelector.addEventListener('change', async (e) => {
            currentPath = e.target.value;
            if (!currentPath) return;

            const res = await fetch(`../${currentPath}`);
            const html = await res.text();
            
            // Extract body content to avoid nesting <html> tags
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const bodyContent = doc.body.innerHTML;
            
            editor.setComponents(bodyContent);
            // Also grab styles if there are any
            const styles = doc.querySelector('style')?.innerHTML || '';
            editor.setStyle(styles);
        });

        // --- UPGRADED SAVE COMMAND ---
        editor.Panels.addButton('options', [{
            id: 'save-github',
            className: 'fa fa-floppy-o',
            label: ' SAVE',
            command: 'save-to-github',
        }]);

        editor.Commands.add('save-to-github', {
            run: async function(editor, sender) {
                sender && sender.set('active', 0);
                const token = localStorage.getItem('gh_pat');
                if (!token) {
                    const t = prompt('Enter GitHub PAT:');
                    if(t) localStorage.setItem('gh_pat', t);
                    else return;
                }

                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${currentPath}`;

                try {
                    // 1. Get the current full file to preserve the <head>
                    const getRes = await fetch(apiUrl, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const fileData = await getRes.json();
                    const oldContent = decodeURIComponent(escape(atob(fileData.content)));
                    
                    // 2. Parse the old file and swap the body with GrapesJS content
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(oldContent, 'text/html');
                    
                    // TAILWIND FIX 2: We inject the GrapesJS HTML and the generated CSS 
                    // into the body, leaving the head (with Tailwind config) alone.
                    doc.body.innerHTML = `
                        <div id="site-content">
                            ${editor.getHtml()}
                            <style>${editor.getCss()}</style>
                        </div>
                    `;

                    const finalHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
                    const encodedContent = btoa(unescape(encodeURIComponent(finalHtml)));

                    // 3. Push to GitHub
                    const putRes = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Update ${currentPath} via Admin`,
                            content: encodedContent,
                            sha: fileData.sha
                        })
                    });

                    if (putRes.ok) alert(`Published ${currentPath}!`);
                    else alert('Error: ' + (await putRes.json()).message);

                } catch (err) {
                    alert('Save Failed: ' + err.message);
                }
            }
        });

        // Initialize file list
        loadFileList();
    </script>
</body>
</html>
