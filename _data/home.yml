  #### "Our vision is to create a space for young people in Los Angeles to care for their inner-wellbeing through yoga, sound baths, empowering workshops & good food."

  Hiii we are Vraja & Kunja, the owners of Studio Om. Not many people know it but yoga is grounded in the timeless science of Bhakti, wisdom for genuine self-growth, happiness and connection to the love supreme.
