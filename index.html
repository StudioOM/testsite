---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Om | Wellness Lounge Los Angeles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A1118; color: #f1f5f9; scroll-behavior: smooth; }
        .glass-nav { background: rgba(10, 17, 24, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-video-overlay { background: linear-gradient(to bottom, rgba(10, 17, 24, 0.4), rgba(10, 17, 24, 0.8)); }
    </style>
</head>
<body>
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="h-10 w-10 bg-blue-500/20 rounded-full flex items-center justify-center border border-blue-500/50">
                    <span class="text-[10px] uppercase tracking-tighter">OM</span>
                </div>
                <a href="#" class="text-xl font-light tracking-[0.3em] uppercase hidden sm:block">Studio Om</a>
            </div>
            <div class="hidden md:flex items-center gap-8 text-[11px] tracking-[0.2em] uppercase text-slate-300 font-medium">
                <button class="bg-white text-[#0A1118] px-6 py-2.5 rounded-full hover:bg-slate-200 transition-colors">Book Now</button>
            </div>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 hero-video-overlay z-10"></div>
        <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover">
            <source src="https://videos.ctfassets.net/xlosfajxk15z/5MdWF0lp3UghDBqNta13pI/b331ef88e7b24f333af182d66e3b3290/heroBackground-6MB.mp4" type="video/mp4">
        </video>
        <div class="relative z-20 text-center px-6 mt-20">
            <h1 class="text-6xl md:text-9xl font-light tracking-tighter mb-6 italic">{{ site.data.home.hero_title | default: "Feed Your Soul" }}</h1>
            <p class="text-sm md:text-base tracking-[0.4em] uppercase text-blue-400 font-light">{{ site.data.home.hero_subtitle | default: "Wellness Lounge" }}</p>
        </div>
    </section>

    <section id="vision" class="py-24 md:py-40 px-6 max-w-7xl mx-auto">
        <div class="grid md:grid-cols-2 gap-16 items-center">
            <div class="aspect-[4/5] bg-slate-800 rounded-2xl overflow-hidden shadow-2xl">
                <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale">
            </div>
            <div class="space-y-8">
                <h2 class="text-sm tracking-[0.4em] uppercase text-blue-400">Our Vision</h2>
                <div class="space-y-6 text-slate-400 leading-loose font-light text-xl">
                    {{ site.data.home.vision_text | markdownify }}
                </div>
            </div>
        </div>
    </section>
</body>
</html>
